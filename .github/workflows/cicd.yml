name: CI/CD Pipeline

on:
  push:
    branches:
      - prod
      - dev
      - staging

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ Build DEV
      - name: Build & Push DEV
        if: github.ref == 'refs/heads/dev'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:dev ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:dev

          # ✅ Build STAGING
      - name: Build & Push STAGING
        if: github.ref == 'refs/heads/staging'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:staging ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:staging

      # ✅ Build PROD
      - name: Build & Push PROD
        if: github.ref == 'refs/heads/prod'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:prod ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:prod


  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy ke DEV EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:dev
            docker rm -f app-dev || true
            docker run -d -p 8080:80 --name app-dev ${{ secrets.DOCKER_USERNAME }}/devops-app:dev

            # ✅ HEALTHCHECK
            echo "Waiting app to start..."
            sleep 5

            curl -f http://localhost:8080 || (echo "Healthcheck FAILED DEV" && exit 1)

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Deploy ke STAGING EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:staging
            docker rm -f app-staging || true
            docker run -d -p 8081:80 --name app-staging ${{ secrets.DOCKER_USERNAME }}/devops-app:staging
            
            # ✅ HEALTHCHECK
            echo "Waiting app to start..."
            sleep 5

            curl -f http://localhost:8081 || (echo "Healthcheck FAILED STAGING" && exit 1)


  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy ke PROD EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:prod
            docker rm -f app-prod || true
            docker run -d -p 8082:80 --name app-prod ${{ secrets.DOCKER_USERNAME }}/devops-app:prod

            # ✅ HEALTHCHECK
            echo "Waiting app to start..."
            sleep 5

            curl -f http://localhost:8082 || (echo "Healthcheck FAILED PROD" && exit 1)