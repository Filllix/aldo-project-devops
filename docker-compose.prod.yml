services:
  app-blue:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/devops-app:prod
    container_name: app-blue
    restart: always
    expose:
      - "80"
    networks:
      - bluegreen
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5

  app-green:
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/devops-app:prod
    container_name: app-green
    restart: always
    expose:
      - "80"
    networks:
      - bluegreen
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-prod
    restart: always
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-prod
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-prod
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-prod-storage:/var/lib/grafana
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bluegreen
    depends_on:
      - app-blue
      - app-green

networks:
  bluegreen:
    name: bluegreen

volumes:
  grafana-prod-storage:
