services:
  app:
    build:
      context: ./app

    container_name: app-dev

    restart: unless-stopped

    ports:
      - "8080:80"

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus-dev

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml